<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planned Hikes | Trail Explorer</title>
    <link rel="stylesheet" href="./src/css/style.css" />
    <script type="module" src="./src/js/planned.js" defer></script>
</head>
<body>
    <header class="hero">
      <nav class="top-nav" aria-label="Primary navigation">
        <a class="brand" href="./index.html">Trail Explorer</a>
        <button class="nav-link" id="favorites-button" type="button" aria-controls="favorites-modal" aria-expanded="false">Favorites</button>
      </nav>

      <div class="hero__content">
        <div class="hero__copy">
            <p class="eyebrow">Trails in Idaho</p>
            <h1>Planned Hikes</h1>
            <p>Keep track of the trails you want to hike and add notes for each route before you go.</p>
            <div class="hero__actions">
                <a class="button button--primary" href="./index.html">Home</a>
            </div>
        </div>
      </div>
    </header>

    <main class="page">
      <section class="panel">
        <div class="panel__header">
          <h2>Saved trail plans</h2>
        </div>
        <ul class="planned-list">
        </ul>
      </section>

      <section class="panel">
        <div class="panel__header">
          <h2>Plan details</h2>
        </div>
        <form class="planned-form">
          <label for="selected-hike">Selected hike</label>
          <input id="selected-hike" type="text" placeholder="Hike name" maxlength="35" />

          <label for="plan-notes">Notes</label>
          <textarea id="plan-notes" rows="5" placeholder="Add any notes or reminders for the hike"></textarea>

          <p id="hike-name-error" class="form-error" role="alert"></p>

          <button class="button button--primary" type="submit">Save plan</button>
        </form>
      </section>
    </main>

    <div class="modal" id="favorites-modal" aria-hidden="true" aria-labelledby="favorites-title" role="dialog">
      <div class="modal__backdrop" id="modal-backdrop"></div>
      <div class="modal__panel">
        <div class="modal__header">
          <h2 id="favorites-title">Your favorites</h2>
          <button id="modal-close" type="button" aria-label="Close favorites">x</button>
        </div>
        <p class="modal__intro">A quick list of saved trails for easy access.</p>
        <ul class="favorites-list">
          <li class="favorites-empty">No favorite trails saved yet.</li>
        </ul>
      </div>
    </div>
</body>
</html>
